name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact: Resonance-macos-arm64
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            artifact: Resonance-macos-x64
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            artifact: Resonance-linux-x64
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact: Resonance-win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests (skip embedding-heavy tests in CI)
        run: npx vitest run --exclude '**/embedding.test.ts' --exclude '**/integration.test.ts' --exclude '**/hnsw*'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/app
          tauriScript: npx tauri

      - name: Find build output
        id: output
        shell: bash
        run: |
          BUNDLE_DIR="packages/app/src-tauri/target/release/bundle"
          echo "bundle_dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          ls -lhR "$BUNDLE_DIR" || true

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/app/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Linux deb + rpm
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/app/src-tauri/target/release/bundle/deb/*.deb
            packages/app/src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/app/src-tauri/target/release/bundle/msi/*.msi
            packages/app/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
