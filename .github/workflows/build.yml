name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: node20-macos-arm64
            artifact: resonance-macos-arm64
          - os: ubuntu-latest
            target: node20-linux-x64
            artifact: resonance-linux-x64
          - os: windows-latest
            target: node20-win-x64
            artifact: resonance-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (skip embedding-dependent tests on CI build)
        run: npx vitest run --exclude '**/embedding.test.ts' --exclude '**/integration.test.ts'

      - name: Bundle with esbuild
        run: npx tsx packages/app/scripts/build.ts

      - name: Build binary with pkg
        run: |
          cd packages/app
          npx pkg dist/main.js --target ${{ matrix.target }} --output dist/bin/${{ matrix.artifact }}

      - name: Prepare release archive
        shell: bash
        run: |
          mkdir -p packages/app/dist/release

          # Copy binary + UI files (no native modules needed — all WASM)
          cp packages/app/dist/bin/${{ matrix.artifact }} packages/app/dist/release/
          cp -r packages/app/dist/ui packages/app/dist/release/ui

          ls -lh packages/app/dist/release/

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd packages/app/dist/release
          chmod +x ${{ matrix.artifact }}
          tar czf ../../${{ matrix.artifact }}.tar.gz *

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path packages/app/dist/release/* -DestinationPath packages/app/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/app/${{ matrix.artifact }}.tar.gz
            packages/app/${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

      - name: Update Homebrew formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Get SHA256 of release assets
          MAC_SHA=$(sha256sum artifacts/resonance-macos-arm64/resonance-macos-arm64.tar.gz | cut -d' ' -f1)
          LINUX_SHA=$(sha256sum artifacts/resonance-linux-x64/resonance-linux-x64.tar.gz | cut -d' ' -f1)

          # Clone homebrew tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/Planetary-e/homebrew-resonance.git tap
          cd tap

          # Update formula
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/resonance.rb
          sed -i "s|/download/v[^/]*/resonance-macos|/download/v${VERSION}/resonance-macos|g" Formula/resonance.rb
          sed -i "s|/download/v[^/]*/resonance-linux|/download/v${VERSION}/resonance-linux|g" Formula/resonance.rb
          sed -i "/macos-arm64.tar.gz/{ n; s/sha256 \".*\"/sha256 \"${MAC_SHA}\"/; }" Formula/resonance.rb
          sed -i "/linux-x64.tar.gz/{ n; s/sha256 \".*\"/sha256 \"${LINUX_SHA}\"/; }" Formula/resonance.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/resonance.rb
          git diff --cached --quiet || (git commit -m "Update resonance to v${VERSION}" && git push)
