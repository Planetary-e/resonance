name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_args: --mac
            artifact_pattern: "*.dmg"
          - os: ubuntu-latest
            build_args: --linux
            artifact_pattern: "*.AppImage"
          - os: windows-latest
            build_args: --win
            artifact_pattern: "*.exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=@resonance/core && npm test --workspace=@resonance/node && npm test --workspace=@resonance/relay
        continue-on-error: true

      - name: Build React + Electron
        working-directory: packages/app
        run: npx vite build

      - name: Package with electron-builder
        working-directory: packages/app
        run: npx electron-builder ${{ matrix.build_args }} --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            packages/app/dist-release/**/*.dmg
            packages/app/dist-release/**/*.AppImage
            packages/app/dist-release/**/*.exe
            packages/app/dist-release/**/*.zip
            !packages/app/dist-release/**/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Clone homebrew tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/Planetary-e/homebrew-resonance.git tap
          cd tap

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/resonance.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/resonance.rb
          git diff --cached --quiet || (git commit -m "Update resonance to v${VERSION}" && git push)
